<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Списки HTML</title>
</head>
<body>
    <h2>Я знаю, як оформляти:</h2>
    <ol>
        <li>Шрифти
            <ul>
                <li>Розмір</li>
                <li>Колір</li>
                <li>Гарнітуру</li>
                <li>Індекси</li>
            </ul>
        </li>
        <li>Заголовки
            <ul>
                <li>Від 1-го до 6-го рівня</li>
            </ul>
        </li>
        <li>Абзаци
            <ul>
                <li>Вирівнювання</li>
                <li>Розрив рядків усередині абзацу</li>
                <li>З використанням переформатування</li>
            </ul>
        </li>
    </ol>    
    <h2>Таблиця з числами</h2>
    <table style="margin: auto; border-collapse: collapse; text-align: center;" border="1">
        <tr>
            <td style="padding: 20px; background-color: #ffffcc;">1</td>
            <td style="padding: 20px;">2</td>
            <td style="padding: 20px; background-color: #ff3333;">3</td>
        </tr>
        <tr>
            <td style="padding: 20px;">4</td>
            <td style="padding: 20px; background-color: #99ccff;">5</td>
            <td style="padding: 20px;">6</td>
        </tr>
        <tr>
            <td style="padding: 20px; background-color: #33cc33;">7</td>
            <td style="padding: 20px;">8</td>
            <td style="padding: 20px; background-color: #cccccc;">9</td>
        </tr>
        <tr>
            <td colspan="3" style="padding: 20px; background-color: #ffffff;">0</td>
        </tr>
        <tr>
            <td colspan="3" style="padding: 20px; background-color: #ff6699;"></td>
        </tr>
    </table>
</body>
</html>
